<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>05월 27일 부스팅 서버</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Noto Sans KR','Inter',-apple-system,sans-serif;
            background: #f7f8fa;
            color: #1e2028;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== LOGIN ===== */
        .login-screen {
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; padding: 20px;
            background: linear-gradient(160deg, #f0f2f5 0%, #e4e8ee 100%);
        }
        .login-box {
            background: #fff;
            border: 1px solid #e0e3e8;
            border-radius: 14px;
            padding: 52px 44px 44px;
            width: 100%; max-width: 360px;
            text-align: center;
            box-shadow: 0 8px 40px rgba(0,0,0,0.06);
        }
        .login-label {
            display: inline-block;
            font-size: 11px; font-weight: 600;
            color: #6b7a90;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        .login-box h1 {
            font-size: 22px; font-weight: 700; color: #1e2028;
            margin-bottom: 32px;
            letter-spacing: -0.3px;
        }
        .login-input {
            width: 100%;
            background: #f5f6f8;
            border: 1.5px solid #e0e3e8;
            border-radius: 10px;
            padding: 14px 16px;
            font-size: 16px;
            font-family: 'Inter',sans-serif;
            color: #1e2028;
            outline: none;
            text-align: center;
            letter-spacing: 6px;
            transition: border-color 0.2s, background 0.2s;
        }
        .login-input::placeholder { letter-spacing: 1px; color: #b0b8c4; font-size: 13px; }
        .login-input:focus { border-color: #4a6cf7; background: #fff; }
        .login-btn {
            width: 100%; margin-top: 14px;
            background: #1e2028; color: #fff;
            border: none; border-radius: 10px;
            padding: 14px; font-size: 14px; font-weight: 600;
            font-family: 'Noto Sans KR',sans-serif;
            cursor: pointer; transition: background 0.2s;
        }
        .login-btn:hover { background: #2d3040; }
        .login-error {
            color: #e04545; font-size: 12px; margin-top: 14px;
            display: none; font-weight: 500;
        }
        .login-error.show { display: block; }
        .shake { animation: shake 0.35s ease; }
        @keyframes shake {
            0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)}
        }

        /* ===== APP SHELL ===== */
        .app { display:none; min-height:100vh; flex-direction:column; }
        .app.active { display:flex; }

        /* Nav */
        .nav {
            background: #fff;
            border-bottom: 1px solid #e8eaef;
            padding: 0 36px;
            display: flex; align-items: center;
            height: 54px;
            flex-shrink: 0;
        }
        .nav-title {
            font-size: 14px; font-weight: 700; color: #1e2028;
            letter-spacing: -0.2px;
            white-space: nowrap;
        }
        .nav-sep {
            width: 1px; height: 20px;
            background: #e0e3e8;
            margin: 0 20px;
        }
        /* breadcrumb */
        .breadcrumb {
            display: flex; align-items: center; gap: 6px;
            font-size: 13px; color: #8a93a4;
        }
        .breadcrumb span { cursor: default; }
        .breadcrumb .bc-link {
            color: #8a93a4; cursor: pointer;
            transition: color 0.15s;
        }
        .breadcrumb .bc-link:hover { color: #4a6cf7; }
        .breadcrumb .bc-arrow { font-size: 10px; color: #c0c6d0; margin: 0 2px; }
        .breadcrumb .bc-current { color: #1e2028; font-weight: 600; }
        .nav-right { margin-left: auto; }
        .nav-btn {
            background: none; border: 1px solid #e0e3e8; border-radius: 7px;
            color: #8a93a4; font-size: 12px; padding: 6px 14px;
            cursor: pointer; font-family: 'Noto Sans KR',sans-serif;
            transition: all 0.15s;
        }
        .nav-btn:hover { color: #1e2028; border-color: #ccd0d8; }

        /* ===== HOME VIEW ===== */
        .view { display:none; flex:1; }
        .view.active { display:block; }

        .home-view {
            max-width: 860px;
            margin: 0 auto;
            padding: 56px 36px 80px;
        }
        .home-greeting {
            font-size: 13px; font-weight: 500; color: #8a93a4;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }
        .home-title {
            font-size: 26px; font-weight: 700; color: #1e2028;
            margin-bottom: 40px;
            letter-spacing: -0.5px;
        }

        .section-label {
            font-size: 12px; font-weight: 600; color: #8a93a4;
            letter-spacing: 0.5px; text-transform: uppercase;
            margin-bottom: 14px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin-bottom: 36px;
        }
        .card {
            background: #fff;
            border: 1.5px solid #e8eaef;
            border-radius: 12px;
            padding: 28px 26px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .card:hover {
            border-color: #ccd0d8;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            transform: translateY(-1px);
        }
        .card-name {
            font-size: 15px; font-weight: 600; color: #1e2028;
            margin-bottom: 6px;
        }
        .card-desc {
            font-size: 12px; color: #8a93a4; line-height: 1.5;
        }
        .card-arrow {
            position: absolute;
            right: 22px; top: 50%;
            transform: translateY(-50%);
            font-size: 14px; color: #c0c6d0;
            transition: color 0.15s;
        }
        .card:hover .card-arrow { color: #8a93a4; }
        .card.disabled {
            opacity: 0.45; cursor: default;
        }
        .card.disabled:hover {
            border-color: #e8eaef;
            box-shadow: none;
            transform: none;
        }
        .card-badge {
            display: inline-block;
            font-size: 10px; font-weight: 600;
            color: #fff; background: #4a6cf7;
            padding: 2px 8px; border-radius: 4px;
            margin-left: 8px; vertical-align: middle;
        }
        .card-badge.soon {
            background: #e0e3e8; color: #8a93a4;
        }

        /* ===== SUB LIST VIEW (성장재화 하위 목록) ===== */
        .sublist-view {
            max-width: 860px;
            margin: 0 auto;
            padding: 56px 36px 80px;
        }
        .sublist-title {
            font-size: 22px; font-weight: 700; color: #1e2028;
            margin-bottom: 8px; letter-spacing: -0.3px;
        }
        .sublist-desc {
            font-size: 13px; color: #8a93a4;
            margin-bottom: 36px;
        }
        .list-item {
            background: #fff;
            border: 1.5px solid #e8eaef;
            border-radius: 12px;
            padding: 22px 26px;
            margin-bottom: 10px;
            display: flex; align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .list-item:hover {
            border-color: #ccd0d8;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }
        .list-item-dot {
            width: 8px; height: 8px; border-radius: 50%;
            margin-right: 16px; flex-shrink: 0;
        }
        .list-item-name {
            font-size: 14px; font-weight: 600; color: #1e2028;
        }
        .list-item-status {
            margin-left: auto;
            font-size: 11px; font-weight: 500;
            color: #8a93a4;
        }
        .list-item-status.ready { color: #4a6cf7; }
        .list-item.disabled {
            opacity: 0.4; cursor: default;
        }
        .list-item.disabled:hover {
            border-color: #e8eaef; box-shadow: none;
        }
        .list-item-arrow {
            margin-left: 12px;
            font-size: 13px; color: #c0c6d0;
        }

        /* ===== SIMULATOR VIEW ===== */
        .sim-view { flex:1; display:none; }
        .sim-view.active { display:block; }
        .sim-iframe {
            width: 100%;
            height: calc(100vh - 54px);
            border: none;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 640px) {
            .card-grid { grid-template-columns: 1fr; }
            .home-view, .sublist-view { padding: 36px 20px 60px; }
            .nav { padding: 0 20px; }
            .home-title { font-size: 22px; }
        }
    </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
    <div class="login-box">
        <div class="login-label">Boosting Server</div>
        <h1>부스팅 서버</h1>
        <input type="password" class="login-input" id="pwInput" placeholder="비밀번호" maxlength="10" autocomplete="off">
        <button class="login-btn" id="loginBtn">입장</button>
        <div class="login-error" id="loginError">비밀번호가 올바르지 않습니다</div>
    </div>
</div>

<!-- APP -->
<div class="app" id="app">
    <!-- Nav -->
    <div class="nav">
        <span class="nav-title">05월 27일 부스팅 서버</span>
        <div class="nav-sep"></div>
        <div class="breadcrumb" id="breadcrumb">
            <span class="bc-current">홈</span>
        </div>
        <div class="nav-right">
            <button class="nav-btn" id="logoutBtn">나가기</button>
        </div>
    </div>

    <!-- HOME -->
    <div class="view active" id="view-home">
        <div class="home-view">
            <div class="home-greeting">Boosting Simulator</div>
            <div class="home-title">시뮬레이터를 선택하세요</div>

            <div class="section-label">카테고리</div>
            <div class="card-grid">
                <div class="card" data-goto="growth">
                    <div class="card-name">성장 재화 <span class="card-badge">4종</span></div>
                    <div class="card-desc">잠재력, 스킬 성장, 공허의 기운, 룬</div>

                    <div class="card-arrow">&#8250;</div>
                </div>
                <div class="card" data-sim="summon">
                    <div class="card-name">소환권 <span class="card-badge">시뮬레이터</span></div>
                    <div class="card-desc">클래스, 펫, 투혼, 카드 소환권 배분</div>
                    <div class="card-arrow">&#8250;</div>
                </div>
            </div>
        </div>
    </div>

    <!-- GROWTH SUB LIST -->
    <div class="view" id="view-growth">
        <div class="sublist-view">
            <div class="sublist-title">성장 재화</div>
            <div class="sublist-desc">시뮬레이션할 항목을 선택하세요</div>

            <div class="list-item" data-sim="potential">
                <div class="list-item-dot" style="background:#4a6cf7;"></div>
                <div class="list-item-name">잠재력</div>
                <div class="list-item-status ready">사용 가능</div>
                <div class="list-item-arrow">&#8250;</div>
            </div>
            <div class="list-item" data-sim="skill">
                <div class="list-item-dot" style="background:#8b5cc8;"></div>
                <div class="list-item-name">스킬 성장</div>
                <div class="list-item-status ready">사용 가능</div>
                <div class="list-item-arrow">&#8250;</div>
            </div>
            <div class="list-item" data-sim="vacuity">
                <div class="list-item-dot" style="background:#5a3a8a;"></div>
                <div class="list-item-name">공허의 기운</div>
                <div class="list-item-status ready">사용 가능</div>
                <div class="list-item-arrow">&#8250;</div>
            </div>
            <div class="list-item" data-sim="rune">
                <div class="list-item-dot" style="background:#c87b2a;"></div>
                <div class="list-item-name">룬</div>
                <div class="list-item-status ready">사용 가능</div>
                <div class="list-item-arrow">&#8250;</div>
            </div>
        </div>
    </div>

    <!-- SIMULATOR -->
    <div class="sim-view" id="view-sim">
        <iframe class="sim-iframe" id="simFrame" src="about:blank"></iframe>
    </div>
</div>

<script>
const PASSWORD = '0527';

/* --- Elements --- */
const loginScreen = document.getElementById('loginScreen');
const app = document.getElementById('app');
const pwInput = document.getElementById('pwInput');
const loginBtn = document.getElementById('loginBtn');
const loginError = document.getElementById('loginError');
const breadcrumb = document.getElementById('breadcrumb');

/* --- 시뮬레이터 매핑 --- */
const SIM_FILES = {
    potential: { file: 'potential.html', label: '잠재력' },
    skill: { file: 'skill.html', label: '스킬 성장' },
    rune: { file: 'rune.html', label: '룬' },
    vacuity: { file: 'vacuity.html', label: '공허의 기운' },
    summon: { file: 'https://boosting-summon-simulator-ughevvwnnrnt3bbxamoafx.streamlit.app/', label: '소환권' },
};

const CATEGORY_LABELS = {
    growth: '성장 재화',
    summon: '소환권',
};

/* --- Session --- */
if (sessionStorage.getItem('authed') === '1') {
    loginScreen.style.display = 'none';
    app.classList.add('active');
}

/* --- Login --- */
function tryLogin() {
    if (pwInput.value === PASSWORD) {
        sessionStorage.setItem('authed', '1');
        loginScreen.style.display = 'none';
        app.classList.add('active');
    } else {
        loginError.classList.add('show');
        pwInput.classList.add('shake');
        setTimeout(() => pwInput.classList.remove('shake'), 400);
        pwInput.value = '';
        pwInput.focus();
    }
}
loginBtn.addEventListener('click', tryLogin);
pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

document.getElementById('logoutBtn').addEventListener('click', () => {
    sessionStorage.removeItem('authed');
    app.classList.remove('active');
    loginScreen.style.display = 'flex';
    pwInput.value = '';
    loginError.classList.remove('show');
    navigateTo('home');
});

/* --- Navigation --- */
function navigateTo(viewId, simKey) {
    // 모든 뷰 숨기기
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-sim').classList.remove('active');

    if (viewId === 'sim' && simKey && SIM_FILES[simKey]) {
        // 외부 URL (http로 시작)은 새 탭으로 열기
        if (SIM_FILES[simKey].file.startsWith('http')) {
            window.open(SIM_FILES[simKey].file, '_blank');
            return;
        }
        document.getElementById('view-sim').classList.add('active');
        const frame = document.getElementById('simFrame');
        if (frame.getAttribute('data-loaded') !== simKey) {
            frame.src = SIM_FILES[simKey].file;
            frame.setAttribute('data-loaded', simKey);
        }
        // breadcrumb: 홈 > 성장 재화 > 잠재력
        const catKey = 'growth'; // 현재는 성장 재화만
        setBreadcrumb([
            { label: '홈', action: () => navigateTo('home') },
            { label: CATEGORY_LABELS[catKey], action: () => navigateTo(catKey) },
            { label: SIM_FILES[simKey].label },
        ]);
    } else if (viewId === 'home') {
        document.getElementById('view-home').classList.add('active');
        setBreadcrumb([{ label: '홈' }]);
    } else {
        const el = document.getElementById('view-' + viewId);
        if (el) el.classList.add('active');
        setBreadcrumb([
            { label: '홈', action: () => navigateTo('home') },
            { label: CATEGORY_LABELS[viewId] || viewId },
        ]);
    }
}

function setBreadcrumb(items) {
    breadcrumb.innerHTML = '';
    items.forEach((item, i) => {
        if (i > 0) {
            const arrow = document.createElement('span');
            arrow.className = 'bc-arrow';
            arrow.textContent = '/';
            breadcrumb.appendChild(arrow);
        }
        const span = document.createElement('span');
        if (i === items.length - 1) {
            span.className = 'bc-current';
            span.textContent = item.label;
        } else {
            span.className = 'bc-link';
            span.textContent = item.label;
            span.addEventListener('click', item.action);
        }
        breadcrumb.appendChild(span);
    });
}

/* --- Card clicks --- */
document.querySelectorAll('.card[data-goto]').forEach(card => {
    card.addEventListener('click', () => {
        navigateTo(card.dataset.goto);
    });
});
document.querySelectorAll('.card[data-sim]').forEach(card => {
    card.addEventListener('click', () => {
        navigateTo('sim', card.dataset.sim);
    });
});

/* --- List item clicks --- */
document.querySelectorAll('.list-item[data-sim]').forEach(item => {
    item.addEventListener('click', () => {
        if (item.classList.contains('disabled')) return;
        navigateTo('sim', item.dataset.sim);
    });
});
</script>
</body>
</html>
